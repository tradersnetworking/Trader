<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var h = (location.hostname || "").toLowerCase().replace(/^www\./, "");
        var root = document.documentElement;
        if (h.startsWith("invest.")) {
          root.classList.add("site-invest");
          root.classList.remove("site-main");
          window.__aexSwCleanup = Promise.resolve();
          var invTitle = "Smart Investment \u2022 Secure Future \u2022 Grow Your Wealth";
          var invDesc =
            "Invest in AKSHAYA Exim Traders and earn consistent monthly returns in INR. Flexible lock-in periods, transparent profit sharing, and 100% capital secured.";
          var invSite = "AKSHAYA Exim Invest";
          var ogImg = location.origin + "/assets/share/invest-plans.png";
          var pageUrl = location.origin + "/";
          document.title = invTitle;
          function setMeta(attr, name, val) {
            if (!val) return;
            var el = document.querySelector("meta[" + attr + '="' + name + '"]');
            if (!el) {
              el = document.createElement("meta");
              el.setAttribute(attr, name);
              document.head.appendChild(el);
            }
            el.setAttribute("content", val);
          }
          setMeta("name", "description", invDesc);
          setMeta("property", "og:title", invTitle);
          setMeta("property", "og:description", invDesc);
          setMeta("property", "og:site_name", invSite);
          setMeta("property", "og:url", pageUrl);
          setMeta("property", "og:image", ogImg);
          setMeta("name", "twitter:title", invTitle);
          setMeta("name", "twitter:description", invDesc);
          setMeta("name", "twitter:image", ogImg);
        } else {
          root.classList.add("site-main");
          root.classList.remove("site-invest");
          if ("serviceWorker" in navigator) {
            window.__aexSwCleanup = navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            });
          } else {
            window.__aexSwCleanup = Promise.resolve();
          }
        }
      })();
    </script>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/assets/favicon-48.png" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Default meta replaced per-host by the API when HTML is served (invest vs marketplace). -->
    <meta name="description" content="AKSHAYA Exim — export, import and investment portals." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AKSHAYA Exim" />
    <meta property="og:title" content="AKSHAYA Exim" />
    <meta property="og:description" content="AKSHAYA Exim — export, import and investment portals." />
    <meta property="og:image" content="/assets/logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AKSHAYA Exim" />
    <meta name="twitter:description" content="AKSHAYA Exim — export, import and investment portals." />
    <meta name="twitter:image" content="/assets/logo.png" />
    <meta name="theme-color" content="#002366" />
    <title>AKSHAYA Exim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
