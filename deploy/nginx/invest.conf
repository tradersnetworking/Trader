upstream akshaya_invest_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name invest.akshayaexim.com invest.akshayaexim.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name invest.akshayaexim.com invest.akshayaexim.in;

    ssl_certificate     /etc/letsencrypt/live/invest.akshayaexim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/invest.akshayaexim.com/privkey.pem;

    client_max_body_size 12m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    location /api/ {
        proxy_pass http://akshaya_invest_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://akshaya_invest_api;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://akshaya_invest_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
