# Marketplace — akshayaexim.com / akshayaexim.in
upstream akshaya_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name akshayaexim.com www.akshayaexim.com akshayaexim.in www.akshayaexim.in;
    return 301 https://$host$request_uri;
}

# www → apex (.com)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.akshayaexim.com;

    ssl_certificate     /etc/letsencrypt/live/akshayaexim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/akshayaexim.com/privkey.pem;

    return 301 https://akshayaexim.com$request_uri;
}

# www → apex (.in)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.akshayaexim.in;

    ssl_certificate     /etc/letsencrypt/live/akshayaexim.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/akshayaexim.in/privkey.pem;

    return 301 https://akshayaexim.in$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name akshayaexim.com akshayaexim.in;

    ssl_certificate     /etc/letsencrypt/live/akshayaexim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/akshayaexim.com/privkey.pem;
    # certbot can add akshayaexim.in as SAN on the same cert, or use a second certbot run

    client_max_body_size 12m;
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location ~* ^/assets/.+\.[a-f0-9]{8,}\.(js|css|woff2?|png|jpg|webp|svg)$ {
        proxy_pass http://akshaya_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /api/ {
        proxy_pass http://akshaya_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://akshaya_api;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://akshaya_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
