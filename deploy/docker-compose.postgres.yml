services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: akshaya
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: akshaya_invest
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akshaya -d akshaya_invest"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      INVEST_DATABASE_URL: postgresql://akshaya:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/akshaya_invest
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - main_db:/app/server/prisma/main.db
      - seed_flag:/app/data
      - uploads:/app/server/uploads
    ports:
      - "127.0.0.1:4000:4000"
    entrypoint: ["/app/deploy/entrypoint-postgres.sh"]

volumes:
  pgdata:
  main_db:
  seed_flag:
  uploads:
