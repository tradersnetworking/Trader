services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MAIN_DATABASE_URL: file:/data/main.db
      INVEST_SQLITE_URL: file:/data/invest.db
    volumes:
      - app_data:/data
      - uploads:/app/server/uploads
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  app_data:
  uploads:
