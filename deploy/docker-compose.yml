services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Mount only DB files — do NOT mount the whole prisma/ dir (hides schema from the image)
      - main_db:/app/server/prisma/main.db
      - invest_db:/app/server/prisma/invest.db
      - uploads:/app/server/uploads
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  main_db:
  invest_db:
  uploads:
